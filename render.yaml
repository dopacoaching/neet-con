# Render Blueprint — NEET CON 2026 API (Express + MongoDB)
# Deploy: Render Dashboard > New > Blueprint > pick this repo.
# Secrets (sync:false) are NOT stored here — set them in the Render dashboard.
services:
  - type: web
    name: neetcon-2026-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is provided by Render automatically; server.js reads process.env.PORT.
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ADMIN_CREDENTIALS
        sync: false # "email:password" bootstrap admin login(s)
      - key: CLIENT_URL
        sync: false # e.g. https://neetcon-2026.vercel.app  (no trailing slash)
      - key: REGISTRATION_FEE
        value: "100"
      - key: FORM_INGEST_SECRET
        sync: false # shared secret for the Google-Form free-registration ingest
      # --- HDFC SmartGateway (Juspay) ---
      - key: HDFC_MOCK
        value: "false" # LIVE payments — real money is charged
      - key: HDFC_API_KEY
        sync: false
      - key: HDFC_MERCHANT_ID
        sync: false
      - key: HDFC_RESPONSE_KEY
        sync: false
      - key: HDFC_PAYMENT_PAGE_CLIENT_ID
        sync: false
      - key: HDFC_BASE_URL
        value: https://smartgateway.hdfcbank.com
      - key: HDFC_API_VERSION
        value: "2023-06-30"
      - key: HDFC_REDIRECT_URL
        sync: false # https://<this-service>.onrender.com/api/payment/callback
      - key: HDFC_WEBHOOK_URL
        sync: false # https://<this-service>.onrender.com/api/payment/webhook
      # --- WhatsApp (Meta Cloud API) — primary confirmation channel ---
      - key: WHATSAPP_MOCK
        value: "false" # LIVE — real confirmation messages are sent
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false # any random string; paste the same value in Meta's webhook config
      - key: WHATSAPP_APP_SECRET
        sync: false # Meta app secret — enables webhook HMAC verification (optional)
      - key: WHATSAPP_TEMPLATE_NAME
        value: neetcon_confirmation
      - key: WHATSAPP_TEMPLATE_LANG
        value: en
      - key: WHATSAPP_COUNTRY_CODE
        value: "91"
      - key: WHATSAPP_API_VERSION
        value: v21.0
      # --- Event details (shown in confirmation message / email) ---
      - key: EVENT_DATE
        value: 12 July 2026
      - key: EVENT_TIME
        value: 9:30 AM – 4:00 PM
      - key: EVENT_VENUE
        value: Yamaniya Hall, Kuttikattor
      - key: EVENT_MAP_URL
        value: https://maps.app.goo.gl/b6ZUgZSWgj33UPXv5
      # --- Email (SMTP) — backup confirmation + organizer notification ---
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false # Gmail address
      - key: SMTP_PASS
        sync: false # Gmail App Password (16 chars, no spaces)
      - key: MAIL_FROM
        sync: false # e.g. "NEET CON 2026 <your.gmail@gmail.com>"
      - key: ORGANIZER_EMAIL
        sync: false # where new-registration notifications are sent
